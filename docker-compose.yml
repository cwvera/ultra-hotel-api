services:

  # ──────────────────────────────────────────────
  # SQL SERVER
  # ──────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ultra-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q 'SELECT 1' -b -C -o /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - ultra-net
    restart: unless-stopped

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ultra-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
    volumes:
      - ./ultra.hotel/UltraHotel.Database/SqlServer:/scripts
    entrypoint: /bin/bash
    command: /scripts/init.sh
    restart: "no"
    networks:
      - ultra-net

  # ──────────────────────────────────────────────
  # ELASTICSEARCH  — single node
  # ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.2
    container_name: ultra-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=ultra-hotel-cluster
      - node.name=ultra-hotel-node-1
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - ultra-net
    restart: unless-stopped

  elasticsearch-init:
    image: curlimages/curl:latest
    container_name: ultra-elasticsearch-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./ultra.hotel/UltraHotel.Database/Elasticsearch:/scripts
    entrypoint: sh
    command: /scripts/init.sh
    restart: "no"
    networks:
      - ultra-net

  # ──────────────────────────────────────────────
  # RABBITMQ  — management UI en :15672
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ultra-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - ultra-net
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # API
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ultra-api
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      elasticsearch-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__SqlServer: "Server=sqlserver;Database=UltraHotelDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True"
      Elasticsearch__Url: "http://elasticsearch:9200"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASS}"
      RabbitMQ__VirtualHost: "/"
      JwtSettings__Issuer: "UltraHotel.Api"
      JwtSettings__Audience: "UltraHotel.Client"
      JwtSettings__ExpirationMinutes: "1440"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
    ports:
      - "8080:8080"
    networks:
      - ultra-net
    restart: unless-stopped

networks:
  ultra-net:
    driver: bridge

volumes:
  sqlserver_data:
  es_data:
  rabbitmq_data:
